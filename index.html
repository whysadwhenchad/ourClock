<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>:3</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --clock-scale: 1; --ui-scale: 1; }
        
        body { margin: 0; background-color: #1a1a1a; color: white; font-family: 'Roboto Mono', monospace; height: 100vh; width: 100vw; box-sizing: border-box; overflow: hidden; display: flex; padding: calc(20px * var(--ui-scale)); gap: calc(20px * var(--ui-scale)); }

        #startup-screen { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background-color: #111; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        
        #startup-screen h1 { color: #779E83; margin-bottom: 40px; font-size: 3rem; letter-spacing: 1px; text-transform: lowercase; font-weight: normal; }
        .identity-btn { background-color: #222; color: white; border: 2px solid #779E83; padding: 20px 40px; font-size: 1.5rem; border-radius: 12px; margin: 10px; cursor: pointer; transition: all 0.2s; width: 300px; text-transform: lowercase; letter-spacing: 1px; font-family: inherit; }
        .identity-btn:hover { background-color: #779E83; color: #111; }

        #main-ui { display: none; width: 100%; height: 100%; gap: calc(20px * var(--ui-scale)); }
        #left-panel { flex: 3 1 0%; min-width: 0; background-color: #000000; border-radius: calc(16px * var(--ui-scale)); display: flex; justify-content: center; align-items: center; position: relative; }
        #left-panel-content { display: flex; flex-direction: column; align-items: center; gap: calc(40px * var(--ui-scale)); }
        #right-panel { flex: 1 1 0%; min-width: 0; background-color: #000000; border-radius: calc(16px * var(--ui-scale)); padding: calc(30px * var(--ui-scale)); box-sizing: border-box; display: flex; flex-direction: column; align-items: flex-start; position: relative; }
        
        /* --- SMOOTH REVEAL ANIMATION --- */
        @keyframes smoothReveal {
            0% { opacity: 0; transform: translateY(15px) scale(0.97); filter: blur(4px); }
            100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }
        .animate-reveal {
            animation: smoothReveal 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        #update-image { width: 100%; height: auto; max-height: 60vh; object-fit: contain; border-radius: calc(12px * var(--ui-scale)); background-color: #111; box-shadow: -5px 5px 20px rgba(0,0,0,0.5); opacity: 0; }
        
        #update-message { 
            margin-top: calc(20px * var(--ui-scale)); 
            width: 100%; 
            text-align: left; 
            font-size: calc(1.8rem * var(--ui-scale)); 
            color: #ffcccc; 
            letter-spacing: 1px;
            line-height: 1.4; 
            word-wrap: break-word; 
            opacity: 0;
        }

        #clock-container { display: flex; align-items: center; gap: calc(20px * var(--clock-scale)); --p: calc(10px * var(--clock-scale)); }
        .digit { position: relative; width: calc(100px * var(--clock-scale)); height: calc(184px * var(--clock-scale)); }
        .seg { position: absolute; background-color: #0b140e; transition: background-color 0.1s; border-radius: 0; }
        .seg.on { background-color: #779E83; }
        .seg.a, .seg.g, .seg.d { width: calc(76px * var(--clock-scale)); height: calc(20px * var(--clock-scale)); left: calc(12px * var(--clock-scale)); clip-path: polygon(var(--p) 0, calc(100% - var(--p)) 0, 100% 50%, calc(100% - var(--p)) 100%, var(--p) 100%, 0 50%); }
        .seg.a { top: 0; } .seg.g { top: calc(82px * var(--clock-scale)); } .seg.d { top: calc(164px * var(--clock-scale)); }
        .seg.f, .seg.b, .seg.e, .seg.c { width: calc(20px * var(--clock-scale)); height: calc(76px * var(--clock-scale)); clip-path: polygon(50% 0, 100% var(--p), 100% calc(100% - var(--p)), 50% 100%, 0 calc(100% - var(--p)), 0 var(--p)); }
        .seg.f { top: calc(12px * var(--clock-scale)); left: 0; } .seg.b { top: calc(12px * var(--clock-scale)); left: calc(80px * var(--clock-scale)); } 
        .seg.e { top: calc(96px * var(--clock-scale)); left: 0; } .seg.c { top: calc(96px * var(--clock-scale)); left: calc(80px * var(--clock-scale)); }
        .colon { display: flex; flex-direction: column; gap: calc(30px * var(--clock-scale)); padding-bottom: calc(20px * var(--clock-scale)); }
        .colon div { width: calc(20px * var(--clock-scale)); height: calc(20px * var(--clock-scale)); background-color: #779E83; border-radius: 4px; }
        #ampm { font-size: calc(3rem * var(--clock-scale)); font-weight: bold; color: #779E83; margin-left: calc(15px * var(--clock-scale)); align-self: flex-end; margin-bottom: calc(10px * var(--clock-scale)); }

        .fade-element { transition: opacity 1s ease-in-out; opacity: 1; z-index: 50; }
        #settings-btn { position: absolute; top: calc(25px * var(--ui-scale)); left: calc(25px * var(--ui-scale)); background: none; border: none; cursor: pointer; padding: 0; z-index: 60; }
        #send-btn { background: none; border: none; cursor: pointer; padding: 0; z-index: 60; }
        .svg-icon { stroke: #ffffff; opacity: 0.3; transition: opacity 0.3s ease, transform 0.4s ease; }
        .gear-icon { width: calc(32px * var(--ui-scale)); height: calc(32px * var(--ui-scale)); }
        .plane-icon { width: calc(45px * var(--ui-scale)); height: calc(45px * var(--ui-scale)); }
        #settings-btn:hover .svg-icon, #settings-btn:active .svg-icon, #send-btn:hover .svg-icon, #send-btn:active .svg-icon { opacity: 0.8; }
        #send-btn:hover .plane-icon, #send-btn:active .plane-icon { transform: translate(3px, -3px) scale(1.1); }

        .modal { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; padding: 30px; border-radius: 12px; border: 1px solid #333; box-shadow: 0 15px 50px rgba(0,0,0,0.9); z-index: 100; width: 320px; }
        
        .modal h2 { margin-top: 0; color: #779E83; font-size: 1.8rem; text-align: center; margin-bottom: 25px; text-transform: lowercase; letter-spacing: 1px; font-weight: normal; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; color: #aaa; font-size: 1rem; text-transform: lowercase; letter-spacing: 0.5px;}
        
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%; background: #779E83; cursor: pointer; margin-top: -6px; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; cursor: pointer; background: #333; border-radius: 2px; }
        
        /* --- UPLOAD BOX STYLING --- */
        #upload-box { width: 100%; height: 160px; border: 2px dashed #444; border-radius: 8px; background-color: #1a1a1a; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; overflow: hidden; transition: border-color 0.2s, background-color 0.2s; }
        #upload-box:hover { border-color: #779E83; background-color: #222; }
        #upload-placeholder { display: flex; flex-direction: column; align-items: center; color: #888; transition: color 0.2s; }
        .upload-placeholder-icon { width: 36px; height: 36px; margin-bottom: 10px; stroke: #888; transition: stroke 0.2s; }
        #upload-box:hover #upload-placeholder { color: #ccc; }
        #upload-box:hover .upload-placeholder-icon { stroke: #ccc; }
        #upload-preview { width: 100%; height: 100%; object-fit: cover; display: none; }
        
        textarea { width: 100%; background: #222; color: white; border: 1px solid #444; border-radius: 8px; padding: 12px; box-sizing: border-box; font-family: inherit; resize: vertical; min-height: 80px; }
        .modal-buttons { display: flex; gap: 10px; margin-top: 10px; }
        
        .modal-btn { flex: 1; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-size: 1.1rem; transition: background 0.2s; font-family: inherit; text-transform: lowercase; letter-spacing: 1px; }
        .btn-cancel { background: #333; color: white; }
        .btn-primary { background: #779E83; color: #111; }
        .btn-danger { background: #551111; color: white; width: 100%; margin-top: 20px; }

        /* --- MUSIC PLAYER & LYRICS STYLING --- */
        #music-container { position: absolute; bottom: calc(25px * var(--ui-scale)); left: calc(25px * var(--ui-scale)); display: flex; align-items: center; gap: calc(20px * var(--ui-scale)); z-index: 50; }
        
        #vinyl-player { position: relative; width: calc(80px * var(--ui-scale)); height: calc(80px * var(--ui-scale)); border-radius: 50%; background-color: #111; display: flex; justify-content: center; align-items: center; cursor: pointer; border: 2px solid #333; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.5); transition: border-color 0.3s; }
        #vinyl-player:hover { border-color: #779E83; }
        
        @keyframes spin { 100% { transform: rotate(360deg); } }
        #vinyl-cover { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; animation: spin 4s linear infinite; animation-play-state: paused; opacity: 0.6; transition: opacity 0.3s; }
        #vinyl-player.playing #vinyl-cover { animation-play-state: running; opacity: 0.9; }
        
        #vinyl-hole { position: absolute; width: calc(12px * var(--ui-scale)); height: calc(12px * var(--ui-scale)); background-color: #1a1a1a; border-radius: 50%; z-index: 2; border: 1px solid #333; }
        
        #play-icon { position: absolute; width: calc(24px * var(--ui-scale)); height: calc(24px * var(--ui-scale)); fill: rgba(255,255,255,0.8); z-index: 3; pointer-events: none; transition: opacity 0.2s; }
        #vinyl-player.playing #play-icon { opacity: 0; }
        #vinyl-player:hover #play-icon { opacity: 1; fill: #fff; }

        #restart-btn { background: none; border: none; cursor: pointer; padding: 0; outline: none; opacity: 0.4; transition: opacity 0.2s, transform 0.2s; display: flex; align-items: center; justify-content: center; margin-right: calc(10px * var(--ui-scale)); }
        #restart-btn:hover { opacity: 0.9; transform: scale(1.1); }
        .restart-icon { width: calc(24px * var(--ui-scale)); height: calc(24px * var(--ui-scale)); stroke: white; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

        /* FIXED: Locked position to relative so absolute content starts exactly at the top */
        #lyrics-box { height: calc(75px * var(--ui-scale)); overflow: hidden; position: relative; mask-image: linear-gradient(to bottom, transparent, black 25%, black 75%, transparent); -webkit-mask-image: linear-gradient(to bottom, transparent, black 25%, black 75%, transparent); pointer-events: none; }
        
        /* FIXED: Absolute positioning forces it to ignore flexbox centering rules */
        #lyrics-content { position: absolute; top: 0; left: 0; width: 100%; transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1); margin: 0; padding: 0; list-style: none; text-align: left; }
        
        .lyric-line { height: calc(25px * var(--ui-scale)); line-height: calc(25px * var(--ui-scale)); font-size: calc(0.9rem * var(--ui-scale)); color: rgba(255, 255, 255, 0.3); transition: all 0.5s ease; white-space: nowrap; text-overflow: ellipsis; overflow: hidden; }
        .lyric-line.active { color: #779E83; font-size: calc(1.1rem * var(--ui-scale)); font-weight: bold; }

    </style>
</head>
<body>

    <div id="startup-screen">
        <h1>which lover are you?</h1>
        <button class="identity-btn" onclick="window.setIdentity('clock_A')">lovergirl</button>
        <button class="identity-btn" onclick="window.setIdentity('clock_B')">loverboy</button>
    </div>

    <div id="main-ui">
        <button id="settings-btn" class="fade-element">
