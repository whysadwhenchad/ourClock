<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Clock</title>
    <style>
        :root { --clock-scale: 1; --ui-scale: 1; }
        body { margin: 0; background: #1a1a1a; color: #fff; font-family: -apple-system, sans-serif; height: 100vh; overflow: hidden; display: flex; padding: 20px; gap: 20px; }
        
        #startup-screen { position: absolute; inset: 0; background: #111; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .identity-btn { background: #222; color: #fff; border: 2px solid #779E83; padding: 20px 40px; font-size: 1.5rem; border-radius: 12px; margin: 10px; cursor: pointer; }
        
        #main-ui { display: none; width: 100%; height: 100%; gap: 20px; }
        #left-panel { flex: 3; background: #000; border-radius: 16px; display: flex; justify-content: center; align-items: center; }
        #right-panel { flex: 1; background: #000; border-radius: 16px; padding: 30px; display: flex; flex-direction: column; align-items: flex-start; }
        #update-image { width: 100%; max-height: 50vh; object-fit: contain; border-radius: 12px; display: none; }
        
        .modal { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; padding: 30px; border-radius: 12px; border: 1px solid #333; z-index: 100; width: 300px; }
        .btn { background: #779E83; border: none; padding: 12px; width: 100%; cursor: pointer; color: #000; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="startup-screen">
        <h1>Love Clock</h1>
        <!-- Fixed the onclick scope -->
        <button class="identity-btn" onclick="window.setIdentity('clock_A')">Partner 1</button>
        <button class="identity-btn" onclick="window.setIdentity('clock_B')">Partner 2</button>
    </div>

    <div id="main-ui">
        <div id="left-panel"><h1>Love Clock Active</h1></div>
        <div id="right-panel">
            <img id="update-image" src="" alt="">
            <div id="update-message">Waiting for updates...</div>
            <button class="btn" onclick="document.getElementById('send-modal').style.display='block'">Send Update</button>
        </div>
    </div>

    <div id="send-modal" class="modal">
        <h2>Send Update</h2>
        <input type="file" id="upload-image" accept="image/*">
        <textarea id="upload-text" style="width:100%; margin: 10px 0; background:#222; color:#fff;"></textarea>
        <button id="submit-btn" class="btn">Send</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC1poEPjr2l_Lakru0_tzSoVlSFkm0OLNI",
            authDomain: "ourclock-7f9de.firebaseapp.com",
            projectId: "ourclock-7f9de",
            storageBucket: "ourclock-7f9de.firebasestorage.app",
            messagingSenderId: "1016743428252",
            appId: "1:1016743428252:web:fed353c991cbf5a121ad59"
        };

        const db = getFirestore(initializeApp(firebaseConfig));
        const storage = getStorage();

        let myId, partnerId;

        // Make global so HTML onclick can see it
        window.setIdentity = (id) => {
            myId = id;
            partnerId = (id === "clock_A") ? "clock_B" : "clock_A";
            localStorage.setItem("loveClock_id", id);
            document.getElementById("startup-screen").style.display = "none";
            document.getElementById("main-ui").style.display = "flex";
            
            onSnapshot(doc(db, "screens", myId), (snap) => {
                if(snap.exists()) {
                    const data = snap.data();
                    if(data.imageUrl) {
                        const img = document.getElementById('update-image');
                        img.src = data.imageUrl;
                        img.style.display = "block";
                    }
                    if(data.message) document.getElementById('update-message').innerText = data.message;
                }
            });
        };

        document.getElementById('submit-btn').addEventListener('click', async () => {
            const file = document.getElementById('upload-image').files[0];
            const msg = document.getElementById('upload-text').value;
            let url = document.getElementById('update-image').src;

            if(file) {
                const sRef = ref(storage, 'uploads/' + Date.now());
                await uploadBytes(sRef, file);
                url = await getDownloadURL(sRef);
            }
            
            await setDoc(doc(db, "screens", partnerId), { message: msg, imageUrl: url }, { merge: true });
            document.getElementById('send-modal').style.display = 'none';
        });

        const saved = localStorage.getItem("loveClock_id");
        if (saved) window.setIdentity(saved);
    </script>
</body>
</html>
