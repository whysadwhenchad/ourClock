<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>:3</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#111111">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content=":3">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --clock-scale: 1; --ui-scale: 1; }

        body { margin: 0; background-color: #1a1a1a; color: white; font-family: 'Roboto Mono', monospace; height: 100vh; width: 100vw; box-sizing: border-box; overflow: hidden; display: flex; padding: calc(20px * var(--ui-scale)); gap: calc(20px * var(--ui-scale)); }

        /* ── STARTUP ─────────────────────────────────────────────────────────── */
        #startup-screen { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background-color: #111; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        #startup-screen h1 { color: #779E83; margin-bottom: 40px; font-size: 3rem; letter-spacing: 1px; text-transform: lowercase; font-weight: normal; }
        .identity-btn { background-color: #222; color: white; border: 2px solid #779E83; padding: 20px 40px; font-size: 1.5rem; border-radius: 12px; margin: 10px; cursor: pointer; transition: all 0.2s; width: 300px; text-transform: lowercase; letter-spacing: 1px; font-family: inherit; }
        .identity-btn:hover { background-color: #779E83; color: #111; }
        #install-btn { position: absolute; bottom: 24px; right: 24px; background: none; border: 1px solid rgba(119,158,131,0.35); color: rgba(119,158,131,0.7); border-radius: 10px; padding: 10px 16px; font-family: inherit; font-size: 0.8rem; text-transform: lowercase; letter-spacing: 0.5px; cursor: pointer; transition: all 0.2s; display: flex; gap: 8px; align-items: center; }
        #install-btn:hover { border-color: #779E83; color: #779E83; background: rgba(119,158,131,0.07); }
        #install-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; flex-shrink: 0; }
        #install-toast { display: none; position: absolute; bottom: 70px; right: 24px; background: #1c1c1c; border: 1px solid #333; border-radius: 10px; padding: 14px 16px; font-size: 0.78rem; color: #bbb; line-height: 1.7; max-width: 220px; text-align: left; box-shadow: 0 8px 32px rgba(0,0,0,0.7); }
        #install-toast.visible { display: block; }
        #install-toast strong { color: #779E83; display: block; margin-bottom: 4px; font-size: 0.8rem; }

        /* ── LAYOUT ──────────────────────────────────────────────────────────── */
        #main-ui { display: none; width: 100%; height: 100%; gap: calc(20px * var(--ui-scale)); }
        #left-panel { flex: 3 1 0%; min-width: 0; background-color: #000; border-radius: calc(16px * var(--ui-scale)); display: flex; justify-content: center; align-items: center; position: relative; overflow: hidden; }
        #left-panel-content { display: flex; flex-direction: column; align-items: center; gap: calc(40px * var(--ui-scale)); }
        #right-panel { flex: 1 1 0%; min-width: 0; background-color: #000; border-radius: calc(16px * var(--ui-scale)); padding: calc(30px * var(--ui-scale)); box-sizing: border-box; display: flex; flex-direction: column; align-items: flex-start; position: relative; overflow-y: auto; }

        /* ── REVEAL ANIMATION ────────────────────────────────────────────────── */
        @keyframes smoothReveal { from { opacity: 0; transform: translateY(12px) scale(0.97); filter: blur(4px); } to { opacity: 1; transform: none; filter: none; } }
        .animate-reveal { animation: smoothReveal 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }

        #update-image { width: 100%; height: auto; max-height: 60vh; object-fit: contain; border-radius: calc(12px * var(--ui-scale)); background-color: #111; box-shadow: -5px 5px 20px rgba(0,0,0,0.5); opacity: 0; }
        #update-message { margin-top: calc(20px * var(--ui-scale)); width: 100%; text-align: left; font-size: calc(1.8rem * var(--ui-scale)); color: #ffcccc; letter-spacing: 1px; line-height: 1.4; word-wrap: break-word; opacity: 1; }

        /* ── CLOCK ───────────────────────────────────────────────────────────── */
        #clock-container { display: flex; align-items: center; gap: calc(20px * var(--clock-scale)); --p: calc(10px * var(--clock-scale)); }
        .digit { position: relative; width: calc(100px * var(--clock-scale)); height: calc(184px * var(--clock-scale)); }
        .seg { position: absolute; background-color: #0b140e; transition: background-color 0.1s; }
        .seg.on { background-color: #779E83; }
        .seg.a, .seg.g, .seg.d { width: calc(76px * var(--clock-scale)); height: calc(20px * var(--clock-scale)); left: calc(12px * var(--clock-scale)); clip-path: polygon(var(--p) 0, calc(100% - var(--p)) 0, 100% 50%, calc(100% - var(--p)) 100%, var(--p) 100%, 0 50%); }
        .seg.a { top: 0; } .seg.g { top: calc(82px * var(--clock-scale)); } .seg.d { top: calc(164px * var(--clock-scale)); }
        .seg.f, .seg.b, .seg.e, .seg.c { width: calc(20px * var(--clock-scale)); height: calc(76px * var(--clock-scale)); clip-path: polygon(50% 0, 100% var(--p), 100% calc(100% - var(--p)), 50% 100%, 0 calc(100% - var(--p)), 0 var(--p)); }
        .seg.f { top: calc(12px * var(--clock-scale)); left: 0; } .seg.b { top: calc(12px * var(--clock-scale)); left: calc(80px * var(--clock-scale)); }
        .seg.e { top: calc(96px * var(--clock-scale)); left: 0; } .seg.c { top: calc(96px * var(--clock-scale)); left: calc(80px * var(--clock-scale)); }
        .colon { display: flex; flex-direction: column; gap: calc(30px * var(--clock-scale)); padding-bottom: calc(20px * var(--clock-scale)); }
        .colon div { width: calc(20px * var(--clock-scale)); height: calc(20px * var(--clock-scale)); background-color: #779E83; border-radius: 4px; }
        #ampm { font-size: calc(3rem * var(--clock-scale)); font-weight: bold; color: #779E83; margin-left: calc(15px * var(--clock-scale)); align-self: flex-end; margin-bottom: calc(10px * var(--clock-scale)); }

        /* ── ICON BUTTONS ────────────────────────────────────────────────────── */
        .fade-element { transition: opacity 1.2s ease; opacity: 1; z-index: 50; }
        .fade-element.idle { opacity: 0 !important; pointer-events: none; }
        #settings-btn { position: absolute; top: calc(25px * var(--ui-scale)); left: calc(25px * var(--ui-scale)); background: none; border: none; cursor: pointer; padding: 0; z-index: 60; }
        #fullscreen-btn { position: absolute; top: calc(25px * var(--ui-scale)); left: calc(70px * var(--ui-scale)); background: none; border: none; cursor: pointer; padding: 0; z-index: 60; }
        #send-btn { background: none; border: none; cursor: pointer; padding: 0; z-index: 60; }
        .svg-icon { stroke: #fff; opacity: 0.3; transition: opacity 0.3s, transform 0.4s; }
        .gear-icon { width: calc(32px * var(--ui-scale)); height: calc(32px * var(--ui-scale)); }
        .plane-icon { width: calc(45px * var(--ui-scale)); height: calc(45px * var(--ui-scale)); }
        .fs-icon { width: calc(28px * var(--ui-scale)); height: calc(28px * var(--ui-scale)); }
        #settings-btn:hover .svg-icon, #send-btn:hover .svg-icon, #fullscreen-btn:hover .svg-icon { opacity: 0.8; }
        #send-btn:hover .plane-icon { transform: translate(3px, -3px) scale(1.1); }

        /* ── MODALS ──────────────────────────────────────────────────────────── */
        .modal { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #111; padding: 30px; border-radius: 12px; border: 1px solid #333; box-shadow: 0 15px 50px rgba(0,0,0,0.9); z-index: 100; width: 320px; }
        .modal h2 { margin-top: 0; color: #779E83; font-size: 1.8rem; text-align: center; margin-bottom: 25px; text-transform: lowercase; letter-spacing: 1px; font-weight: normal; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; color: #aaa; font-size: 1rem; text-transform: lowercase; letter-spacing: 0.5px; }
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 16px; width: 16px; border-radius: 50%; background: #779E83; cursor: pointer; margin-top: -6px; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 4px; background: #333; border-radius: 2px; }
        #upload-box { width: 100%; height: 160px; border: 2px dashed #444; border-radius: 8px; background: #1a1a1a; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; overflow: hidden; transition: border-color 0.2s, background 0.2s; }
        #upload-box:hover { border-color: #779E83; background: #222; }
        #upload-placeholder { display: flex; flex-direction: column; align-items: center; color: #888; }
        .upload-placeholder-icon { width: 36px; height: 36px; margin-bottom: 10px; stroke: #888; }
        #upload-box:hover #upload-placeholder { color: #ccc; }
        #upload-box:hover .upload-placeholder-icon { stroke: #ccc; }
        #upload-preview { width: 100%; height: 100%; object-fit: cover; display: none; }
        textarea { width: 100%; background: #222; color: white; border: 1px solid #444; border-radius: 8px; padding: 12px; box-sizing: border-box; font-family: inherit; resize: vertical; min-height: 80px; }
        .modal-buttons { display: flex; gap: 10px; margin-top: 10px; }
        .modal-btn { flex: 1; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-size: 1.1rem; transition: background 0.2s; font-family: inherit; text-transform: lowercase; letter-spacing: 1px; }
        .btn-cancel { background: #333; color: white; }
        .btn-primary { background: #779E83; color: #111; }
        .btn-danger { background: #551111; color: white; width: 100%; margin-top: 20px; }

        /* ── MUSIC PLAYER ────────────────────────────────────────────────────── */
        #music-container {
            position: absolute;
            bottom: calc(20px * var(--ui-scale));
            left:   calc(20px * var(--ui-scale));
            right:  calc(20px * var(--ui-scale));
            z-index: 50;
            display: flex;
            align-items: center;
            gap: calc(14px * var(--ui-scale));
            background: rgba(15,15,15,0.75);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: calc(14px * var(--ui-scale));
            padding: calc(10px * var(--ui-scale)) calc(14px * var(--ui-scale));
            box-sizing: border-box;
            backdrop-filter: blur(16px);
        }

        /* vinyl disc */
        @keyframes spin { to { transform: rotate(360deg); } }

        #vinyl-disc {
            flex-shrink: 0;
            position: relative;
            width:  calc(62px * var(--ui-scale));
            height: calc(62px * var(--ui-scale));
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 0 2px #2a2a2a, 0 4px 16px rgba(0,0,0,0.8);
            transition: box-shadow 0.25s;
        }
        #vinyl-disc:hover {
            box-shadow: 0 0 0 2px #779E83, 0 4px 16px rgba(0,0,0,0.8);
        }

        /* record grooves — base layer */
        #vinyl-grooves {
            position: absolute; inset: 0;
            border-radius: 50%;
            background: repeating-radial-gradient(circle at center, #181818 0px, #111 2px, #181818 4px);
        }

        /* cover art — spins when playing */
        #vinyl-art {
            position: absolute; inset: 0;
            border-radius: 50%;
            width: 100%; height: 100%;
            object-fit: cover;
            animation: spin 6s linear infinite;
            animation-play-state: paused;
            transition: opacity 0.3s;
        }
        #vinyl-disc.playing #vinyl-art { animation-play-state: running; }

        /* centre hole */
        #vinyl-hole {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width:  calc(10px * var(--ui-scale));
            height: calc(10px * var(--ui-scale));
            border-radius: 50%;
            background: #111;
            border: 1px solid #333;
            z-index: 3;
        }

        /* play/pause icon — fades in on hover or while paused */
        #vinyl-pp {
            position: absolute; inset: 0;
            border-radius: 50%;
            background: rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 4;
            pointer-events: none;
        }
        #vinyl-disc:hover #vinyl-pp,
        #vinyl-disc.paused #vinyl-pp { opacity: 1; }
        #vinyl-pp svg {
            width:  calc(18px * var(--ui-scale));
            height: calc(18px * var(--ui-scale));
            fill: white;
            pointer-events: none;
        }

        /* right column */
        #player-body {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: calc(5px * var(--ui-scale));
        }

        /* song info */
        #song-meta { display: flex; flex-direction: column; gap: 1px; }
        #song-title  { font-size: calc(0.78rem * var(--ui-scale)); color: #fff; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        #song-artist { font-size: calc(0.65rem * var(--ui-scale)); color: rgba(255,255,255,0.38); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* lyrics scroller */
        #lyrics-box {
            height: calc(52px * var(--ui-scale));
            overflow: hidden;
            position: relative;
            pointer-events: none;
            mask-image: linear-gradient(to bottom, transparent 0%, black 30%, black 70%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 30%, black 70%, transparent 100%);
        }
        #lyrics-content {
            margin: 0; padding: 0; list-style: none;
            will-change: transform;
        }
        .lyric-line {
            padding: calc(2px * var(--ui-scale)) 0;
            font-size: calc(0.72rem * var(--ui-scale));
            line-height: 1.55;
            color: rgba(255,255,255,0.2);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            transition: color 0.35s ease, font-size 0.35s ease;
        }
        .lyric-line.active {
            color: #779E83;
            font-size: calc(0.85rem * var(--ui-scale));
            font-weight: bold;
        }

        /* progress row */
        #player-controls {
            display: flex;
            align-items: center;
            gap: calc(7px * var(--ui-scale));
        }
        #restart-btn {
            flex-shrink: 0;
            background: none; border: none; cursor: pointer; padding: 0; outline: none;
            color: rgba(255,255,255,0.3);
            transition: color 0.2s, transform 0.3s;
            display: flex; align-items: center;
        }
        #restart-btn:hover { color: rgba(255,255,255,0.8); transform: rotate(-40deg); }
        #restart-btn svg { width: calc(12px * var(--ui-scale)); height: calc(12px * var(--ui-scale)); stroke: currentColor; fill: none; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
        #time-current, #time-total {
            flex-shrink: 0;
            font-size: calc(0.6rem * var(--ui-scale));
            color: rgba(255,255,255,0.28);
            min-width: calc(24px * var(--ui-scale));
        }
        #time-total { text-align: right; }
        #progress-bar {
            flex: 1;
            height: calc(3px * var(--ui-scale));
            background: rgba(255,255,255,0.1);
            border-radius: 99px;
            position: relative;
            cursor: pointer;
            transition: height 0.15s;
        }
        #progress-bar:hover { height: calc(5px * var(--ui-scale)); }
        #progress-fill {
            height: 100%; width: 0%;
            background: #779E83;
            border-radius: 99px;
            pointer-events: none;
        }
        #progress-thumb {
            position: absolute;
            top: 50%;
            width:  calc(9px * var(--ui-scale));
            height: calc(9px * var(--ui-scale));
            background: #fff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.15s;
            left: 0%;
        }
        #progress-bar:hover #progress-thumb { opacity: 1; }
    </style>
</head>
<body>

<div id="startup-screen">
    <h1>which lover are you?</h1>
    <button class="identity-btn" onclick="window.setIdentity('clock_A')">lovergirl</button>
    <button class="identity-btn" onclick="window.setIdentity('clock_B')">loverboy</button>
    <button id="install-btn">
        <svg viewBox="0 0 24 24"><path d="M12 2v13M7 11l5 5 5-5"/><path d="M3 17v2a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-2"/></svg>
        add to home screen
    </button>
    <div id="install-toast"></div>
</div>

<div id="main-ui">
    <button id="settings-btn" class="fade-element">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="svg-icon gear-icon">
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
        </svg>
    </button>

    <button id="fullscreen-btn" class="fade-element" title="fullscreen">
        <svg id="fs-expand" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="svg-icon fs-icon">
            <polyline points="15 3 21 3 21 9"></polyline>
            <polyline points="9 21 3 21 3 15"></polyline>
            <line x1="21" y1="3" x2="14" y2="10"></line>
            <line x1="3" y1="21" x2="10" y2="14"></line>
        </svg>
        <svg id="fs-compress" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="svg-icon fs-icon" style="display:none;">
            <polyline points="4 14 10 14 10 20"></polyline>
            <polyline points="20 10 14 10 14 4"></polyline>
            <line x1="10" y1="14" x2="3" y2="21"></line>
            <line x1="21" y1="3" x2="14" y2="10"></line>
        </svg>
    </button>

    <div id="left-panel">
        <div id="left-panel-content">
            <div id="clock-container">
                <div class="digit" id="h1"><div class="seg a"></div><div class="seg b"></div><div class="seg c"></div><div class="seg d"></div><div class="seg e"></div><div class="seg f"></div><div class="seg g"></div></div>
                <div class="digit" id="h2"><div class="seg a"></div><div class="seg b"></div><div class="seg c"></div><div class="seg d"></div><div class="seg e"></div><div class="seg f"></div><div class="seg g"></div></div>
                <div class="colon"><div></div><div></div></div>
                <div class="digit" id="m1"><div class="seg a"></div><div class="seg b"></div><div class="seg c"></div><div class="seg d"></div><div class="seg e"></div><div class="seg f"></div><div class="seg g"></div></div>
                <div class="digit" id="m2"><div class="seg a"></div><div class="seg b"></div><div class="seg c"></div><div class="seg d"></div><div class="seg e"></div><div class="seg f"></div><div class="seg g"></div></div>
                <div id="ampm">am</div>
            </div>
            <button id="send-btn" class="fade-element">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="svg-icon plane-icon">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>

        <!-- ── MUSIC PLAYER ── -->
        <div id="music-container">
            <audio id="audio-engine" src="song.mp3" preload="auto"></audio>

            <!-- vinyl -->
            <div id="vinyl-disc" class="paused">
                <div id="vinyl-grooves"></div>
                <img id="vinyl-art" src="cover.jpg" alt="" onerror="this.style.opacity='0'">
                <div id="vinyl-hole"></div>
                <div id="vinyl-pp">
                    <svg id="pp-icon" viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                </div>
            </div>

            <!-- info + lyrics + progress -->
            <div id="player-body">
                <div id="song-meta">
                    <span id="song-title">reflections</span>
                    <span id="song-artist"></span>
                </div>

                <div id="lyrics-box">
                    <ul id="lyrics-content">
                        <li class="lyric-line active">♪</li>
                    </ul>
                </div>

                <div id="player-controls">
                    <button id="restart-btn" title="restart">
                        <svg viewBox="0 0 24 24">
                            <polyline points="1 4 1 10 7 10"></polyline>
                            <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"></path>
                        </svg>
                    </button>
                    <span id="time-current">0:00</span>
                    <div id="progress-bar">
                        <div id="progress-fill"></div>
                        <div id="progress-thumb"></div>
                    </div>
                    <span id="time-total">0:00</span>
                </div>
            </div>
        </div>
    </div>

    <div id="right-panel">
        <img id="update-image" src="" alt="Update" style="display:none;">
        <div id="update-message">Waiting for updates...</div>
    </div>
</div>

<!-- settings modal -->
<div id="settings-modal" class="modal">
    <h2>change appearance</h2>
    <div class="input-group"><label>clock size</label><input type="range" id="clock-size" min="0.4" max="1.8" step="0.05" value="1"></div>
    <div class="input-group"><label>layout scale</label><input type="range" id="ui-size" min="0.5" max="1.5" step="0.05" value="1"></div>
    <div class="input-group">
        <label>lyrics offset: <span id="offset-display">0.0s</span></label>
        <input type="range" id="lyrics-offset" min="-30" max="30" step="0.5" value="0">
    </div>
    <button id="close-settings-btn" class="modal-btn btn-primary" style="width:100%;">done</button>
    <button onclick="window.resetIdentity()" class="modal-btn btn-danger">switch lover</button>
</div>

<!-- send modal -->
<div id="send-modal" class="modal">
    <h2>send a message</h2>
    <div class="input-group">
        <label>picture</label>
        <div id="upload-box" onclick="document.getElementById('upload-image').click()">
            <div id="upload-placeholder">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="upload-placeholder-icon">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="17 8 12 3 7 8"></polyline>
                    <line x1="12" y1="3" x2="12" y2="15"></line>
                </svg>
                <span>click to select photo</span>
            </div>
            <img id="upload-preview" src="" alt="Preview">
        </div>
        <input type="file" id="upload-image" accept="image/*" style="display:none;">
    </div>
    <div class="input-group"><label>message</label><textarea id="upload-text"></textarea></div>
    <div class="modal-buttons">
        <button id="cancel-send-btn" class="modal-btn btn-cancel">cancel</button>
        <button id="submit-send-btn" class="modal-btn btn-primary">send &lt;3</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

    // ── FIREBASE ────────────────────────────────────────────────────────────────
    const firebaseConfig = {
        apiKey: "AIzaSyC1poEPjr2l_Lakru0_tzSoVlSFkm0OLNI",
        authDomain: "ourclock-7f9de.firebaseapp.com",
        projectId: "ourclock-7f9de",
        storageBucket: "ourclock-7f9de.firebasestorage.app",
        messagingSenderId: "1016743428252",
        appId: "1:1016743428252:web:fed353c991cbf5a121ad59"
    };
    let db;
    try { const app = initializeApp(firebaseConfig); db = getFirestore(app); }
    catch(e) { console.error("Firebase init failed:", e); }

    // ── STATE ───────────────────────────────────────────────────────────────────
    let myId, partnerId, unsubscribe;
    const IMGBB_KEY = "f5738c52c2302be7a4dbb978a7e7ef28";
    let lastRenderedUrl = null, lastRenderedMsg = null;
    let lyricsOffset = 0;

    // ── RESTORE PREFERENCES ─────────────────────────────────────────────────────
    const savedClockScale    = localStorage.getItem('loveClock_clockScale');
    const savedUiScale       = localStorage.getItem('loveClock_uiScale');
    const savedLyricsOffset  = localStorage.getItem('loveClock_lyricsOffset');

    if (savedClockScale) { document.documentElement.style.setProperty('--clock-scale', savedClockScale); document.getElementById('clock-size').value = savedClockScale; }
    if (savedUiScale)    { document.documentElement.style.setProperty('--ui-scale', savedUiScale);       document.getElementById('ui-size').value = savedUiScale; }
    if (savedLyricsOffset) {
        lyricsOffset = parseFloat(savedLyricsOffset);
        document.getElementById('lyrics-offset').value = savedLyricsOffset;
        document.getElementById('offset-display').innerText = lyricsOffset.toFixed(1) + 's';
    }

    // ── SYNC ENGINE ─────────────────────────────────────────────────────────────
    function renderScreenData(data) {
        if (!data) return;
        const newUrl = (data.imageUrl && data.imageUrl.trim()) ? data.imageUrl : "";
        const newMsg = (data.message  && data.message.trim())  ? data.message  : "";
        if (newUrl === lastRenderedUrl && newMsg === lastRenderedMsg) return;

        const imgEl = document.getElementById('update-image');
        const msgEl = document.getElementById('update-message');

        const apply = () => {
            imgEl.classList.remove('animate-reveal'); msgEl.classList.remove('animate-reveal');
            void imgEl.offsetWidth; void msgEl.offsetWidth;
            if (newUrl) { imgEl.src = newUrl; imgEl.style.display = "block"; imgEl.classList.add('animate-reveal'); }
            else        { imgEl.src = "";     imgEl.style.display = "none"; }
            if (newMsg) { msgEl.innerText = newMsg; msgEl.classList.add('animate-reveal'); }
            else        { msgEl.innerText = ""; }
            lastRenderedUrl = newUrl; lastRenderedMsg = newMsg;
        };

        if (newUrl && newUrl !== lastRenderedUrl) {
            const p = new Image(); p.onload = apply; p.onerror = apply; p.src = newUrl;
        } else { apply(); }
    }

    window.setIdentity = async (id) => {
        document.getElementById("startup-screen").style.display = "none";
        document.getElementById("main-ui").style.display = "flex";
        myId = id; partnerId = id === "clock_A" ? "clock_B" : "clock_A";
        localStorage.setItem("loveClock_id", id);

        // Enter fullscreen automatically on identity selection
        const el = document.documentElement;
        if (el.requestFullscreen) el.requestFullscreen();
        else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
        else if (el.mozRequestFullScreen) el.mozRequestFullScreen();

        loadLyrics();
        if (!db) return;
        try { const snap = await getDoc(doc(db, "screens", myId)); if (snap.exists()) renderScreenData(snap.data()); }
        catch(e) { console.warn("Initial fetch failed:", e); }
        if (unsubscribe) unsubscribe();
        unsubscribe = onSnapshot(doc(db, "screens", myId), snap => { if (snap.exists()) renderScreenData(snap.data()); });
    };

    window.resetIdentity = () => { localStorage.removeItem("loveClock_id"); location.reload(); };

    const saved = localStorage.getItem("loveClock_id");
    if (saved) window.setIdentity(saved);

    // ── UPLOAD ──────────────────────────────────────────────────────────────────
    document.getElementById('upload-image').addEventListener('change', e => {
        const file = e.target.files[0];
        const preview = document.getElementById('upload-preview');
        const placeholder = document.getElementById('upload-placeholder');
        if (file) {
            const r = new FileReader();
            r.onload = ev => { preview.src = ev.target.result; preview.style.display = 'block'; placeholder.style.display = 'none'; };
            r.readAsDataURL(file);
        } else { preview.src = ''; preview.style.display = 'none'; placeholder.style.display = 'flex'; }
    });

    function resetSendMenu() {
        document.getElementById('upload-text').value = "";
        document.getElementById('upload-image').value = "";
        document.getElementById('upload-preview').src = "";
        document.getElementById('upload-preview').style.display = 'none';
        document.getElementById('upload-placeholder').style.display = 'flex';
    }

    document.getElementById('submit-send-btn').addEventListener('click', async () => {
        const file = document.getElementById('upload-image').files[0];
        const msg  = document.getElementById('upload-text').value;
        const btn  = document.getElementById('submit-send-btn');
        btn.disabled = true; btn.innerText = "sending...";
        try {
            let url = "";
            if (file) {
                const fd = new FormData(); fd.append('image', file);
                const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_KEY}`, { method: 'POST', body: fd });
                url = (await res.json()).data.url;
            }
            await setDoc(doc(db, "screens", partnerId), { message: msg, imageUrl: url }, { merge: true });
            document.getElementById('send-modal').style.display = 'none'; resetSendMenu();
        } catch { alert("Failed to send."); }
        finally { btn.disabled = false; btn.innerText = "send <3"; }
    });

    // ── CLOCK ───────────────────────────────────────────────────────────────────
    const digitMap = { 0:['a','b','c','d','e','f'], 1:['b','c'], 2:['a','b','g','e','d'], 3:['a','b','g','c','d'], 4:['f','g','b','c'], 5:['a','f','g','c','d'], 6:['a','f','e','d','c','g'], 7:['a','b','c'], 8:['a','b','c','d','e','f','g'], 9:['a','b','c','d','f','g'] };

    function setDigit(id, num) {
        const el = document.getElementById(id);
        el.querySelectorAll('.seg').forEach(s => s.classList.remove('on'));
        if (num !== ' ' && digitMap[parseInt(num)]) digitMap[parseInt(num)].forEach(c => el.querySelector('.seg.'+c).classList.add('on'));
    }
    function updateClock() {
        const now = new Date(); let h = now.getHours(), m = now.getMinutes();
        const ampm = h >= 12 ? 'pm' : 'am'; h = h % 12 || 12;
        const hStr = h < 10 ? ' '+h : String(h), mStr = m < 10 ? '0'+m : String(m);
        setDigit('h1',hStr[0]); setDigit('h2',hStr[1]); setDigit('m1',mStr[0]); setDigit('m2',mStr[1]);
        document.getElementById('ampm').innerText = ampm;
    }
    setInterval(updateClock, 1000); updateClock();

    // ── MUSIC PLAYER ────────────────────────────────────────────────────────────
    const audio         = document.getElementById('audio-engine');
    const vinylDisc     = document.getElementById('vinyl-disc');
    const ppIcon        = document.getElementById('pp-icon');
    const lyricsBox     = document.getElementById('lyrics-box');
    const lyricsContent = document.getElementById('lyrics-content');
    const progressFill  = document.getElementById('progress-fill');
    const progressThumb = document.getElementById('progress-thumb');
    const progressBar   = document.getElementById('progress-bar');
    const timeCurrent   = document.getElementById('time-current');
    const timeTotal     = document.getElementById('time-total');

    let parsedLyrics = [], activeIndex = -1;

    // play / pause state
    function setPlayState(playing) {
        if (playing) {
            audio.play();
            vinylDisc.classList.add('playing');
            vinylDisc.classList.remove('paused');
            ppIcon.innerHTML = '<rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect>';
        } else {
            audio.pause();
            vinylDisc.classList.remove('playing');
            vinylDisc.classList.add('paused');
            ppIcon.innerHTML = '<polygon points="5 3 19 12 5 21 5 3"></polygon>';
        }
    }

    vinylDisc.addEventListener('click', () => setPlayState(audio.paused));
    document.getElementById('restart-btn').addEventListener('click', () => { audio.currentTime = 0; setPlayState(true); });

    // time formatter
    function fmt(s) { const m = Math.floor(s/60); return m+':'+(Math.floor(s%60)+'').padStart(2,'0'); }

    // progress bar — update fill + thumb position
    audio.addEventListener('timeupdate', () => {
        const pct = audio.duration ? (audio.currentTime / audio.duration) * 100 : 0;
        progressFill.style.width  = pct + '%';
        progressThumb.style.left  = pct + '%';
        timeCurrent.textContent   = fmt(audio.currentTime);
        syncLyrics();
    });
    audio.addEventListener('loadedmetadata', () => { timeTotal.textContent = fmt(audio.duration); });
    audio.addEventListener('ended', () => setPlayState(false));

    // seek on click
    progressBar.addEventListener('click', e => {
        const rect = progressBar.getBoundingClientRect();
        const pct  = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
        audio.currentTime = pct * audio.duration;
    });

    // ── LYRICS ENGINE ────────────────────────────────────────────────────────────
    async function loadLyrics() {
        try {
            const res = await fetch('song.lrc');
            if (!res.ok) throw new Error('no lrc');
            const raw = await res.text();

            // Parse metadata tags for title/artist
            const meta = {};
            raw.split('\n').forEach(line => {
                const m = line.match(/^\[([a-z]+):(.*)\]$/i);
                if (m) meta[m[1].toLowerCase()] = m[2].trim();
            });
            if (meta.ti) document.getElementById('song-title').textContent  = meta.ti;
            if (meta.ar) document.getElementById('song-artist').textContent = meta.ar;

            // Parse timed lines
            parsedLyrics = raw.split('\n').reduce((acc, line) => {
                const m = line.match(/\[(\d+):(\d{2}(?:\.\d+)?)\](.*)/);
                if (m) acc.push({ time: parseInt(m[1],10)*60 + parseFloat(m[2]), text: m[3].trim() });
                return acc;
            }, []).sort((a,b) => a.time - b.time);

            // Build DOM
            lyricsContent.innerHTML = '';
            parsedLyrics.forEach(({ text }) => {
                const li = document.createElement('li');
                li.className = 'lyric-line';
                li.textContent = text || '♪';
                lyricsContent.appendChild(li);
            });

            activeIndex = -1;
            syncLyrics();
        } catch {
            lyricsContent.innerHTML = '<li class="lyric-line active">♪</li>';
        }
    }

    // Binary search — last lyric whose time ≤ t
    function findActiveIndex(t) {
        if (!parsedLyrics.length || t < parsedLyrics[0].time) return -1;
        let lo = 0, hi = parsedLyrics.length - 1;
        while (lo < hi) {
            const mid = Math.ceil((lo+hi)/2);
            if (parsedLyrics[mid].time <= t) lo = mid; else hi = mid-1;
        }
        return lo;
    }

    function syncLyrics() {
        if (!parsedLyrics.length) return;
        const idx = findActiveIndex(audio.currentTime + lyricsOffset);
        if (idx === activeIndex) return;
        activeIndex = idx;

        const lines = lyricsContent.querySelectorAll('.lyric-line');
        lines.forEach((l, i) => l.classList.toggle('active', i === idx));

        // Scroll: measure actual DOM position — no hardcoded pixel math
        if (idx >= 0 && lines[idx]) {
            const boxH     = lyricsBox.offsetHeight;
            const lineTop  = lines[idx].offsetTop;
            const lineH    = lines[idx].offsetHeight;
            const offset   = lineTop - (boxH/2) + (lineH/2);
            lyricsContent.style.transition = 'transform 0.5s cubic-bezier(0.25, 1, 0.5, 1)';
            lyricsContent.style.transform  = `translateY(-${Math.max(0,offset)}px)`;
        } else {
            lyricsContent.style.transition = 'none';
            lyricsContent.style.transform  = 'translateY(0)';
        }
    }

    // ── UI LISTENERS ────────────────────────────────────────────────────────────
    document.getElementById('settings-btn').addEventListener('click', e => { e.stopPropagation(); document.getElementById('settings-modal').style.display = 'block'; });
    document.getElementById('close-settings-btn').addEventListener('click', () => { document.getElementById('settings-modal').style.display = 'none'; });
    document.getElementById('send-btn').addEventListener('click', e => { e.stopPropagation(); document.getElementById('send-modal').style.display = 'block'; });
    document.getElementById('cancel-send-btn').addEventListener('click', () => { document.getElementById('send-modal').style.display = 'none'; resetSendMenu(); });

    document.addEventListener('click', e => {
        const sm = document.getElementById('settings-modal'), sd = document.getElementById('send-modal');
        if (sm.style.display === 'block' && !sm.contains(e.target)) sm.style.display = 'none';
        if (sd.style.display === 'block' && !sd.contains(e.target) && !e.target.closest('#send-btn')) { sd.style.display = 'none'; resetSendMenu(); }
    });

    document.getElementById('clock-size').addEventListener('input', e => { document.documentElement.style.setProperty('--clock-scale', e.target.value); localStorage.setItem('loveClock_clockScale', e.target.value); });
    document.getElementById('ui-size').addEventListener('input', e => { document.documentElement.style.setProperty('--ui-scale', e.target.value); localStorage.setItem('loveClock_uiScale', e.target.value); });
    document.getElementById('lyrics-offset').addEventListener('input', e => {
        lyricsOffset = parseFloat(e.target.value);
        document.getElementById('offset-display').innerText = lyricsOffset.toFixed(1)+'s';
        localStorage.setItem('loveClock_lyricsOffset', e.target.value);
    });

    // ── FULLSCREEN BUTTON ────────────────────────────────────────────────────────
    function isFullscreen() {
        return !!(document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement);
    }

    function updateFsIcons() {
        document.getElementById('fs-expand').style.display   = isFullscreen() ? 'none'  : '';
        document.getElementById('fs-compress').style.display = isFullscreen() ? ''      : 'none';
    }

    document.getElementById('fullscreen-btn').addEventListener('click', () => {
        if (isFullscreen()) {
            if (document.exitFullscreen) document.exitFullscreen();
            else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
            else if (document.mozCancelFullScreen) document.mozCancelFullScreen();
        } else {
            const el = document.documentElement;
            if (el.requestFullscreen) el.requestFullscreen();
            else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
            else if (el.mozRequestFullScreen) el.mozRequestFullScreen();
        }
    });

    document.addEventListener('fullscreenchange',       updateFsIcons);
    document.addEventListener('webkitfullscreenchange', updateFsIcons);
    document.addEventListener('mozfullscreenchange',    updateFsIcons);

    // ── IDLE FADE ────────────────────────────────────────────────────────────────
    // Fade out settings + send + music player after 4s of no mouse/touch activity.
    const fadeEls = document.querySelectorAll('.fade-element');
    let idleTimer;

    function onActivity() {
        fadeEls.forEach(el => el.classList.remove('idle'));
        clearTimeout(idleTimer);
        // Don't hide if a modal is open
        const anyModalOpen = [...document.querySelectorAll('.modal')].some(m => m.style.display === 'block');
        if (!anyModalOpen) {
            idleTimer = setTimeout(() => fadeEls.forEach(el => el.classList.add('idle')), 4000);
        }
    }

    document.addEventListener('mousemove', onActivity);
    document.addEventListener('mousedown', onActivity);
    document.addEventListener('touchstart', onActivity, { passive: true });
    onActivity(); // start the initial timer

    // ── PWA INSTALL BUTTON ───────────────────────────────────────────────────────
    let deferredInstallPrompt = null;
    const installBtn   = document.getElementById('install-btn');
    const installToast = document.getElementById('install-toast');

    // Capture the native prompt on browsers that support it (Chrome/Edge/Android)
    window.addEventListener('beforeinstallprompt', e => {
        e.preventDefault();
        deferredInstallPrompt = e;
    });

    // Detect platform for fallback instructions
    function getInstallInstructions() {
        const ua = navigator.userAgent;
        const isIOS     = /iphone|ipad|ipod/i.test(ua);
        const isSafari  = /safari/i.test(ua) && !/chrome/i.test(ua);
        const isAndroid = /android/i.test(ua);
        const isFirefox = /firefox/i.test(ua);

        if (isIOS || isSafari) {
            return '<strong>safari on ios</strong>tap the <b>share</b> button ↑ at the bottom of your browser, then tap <b>add to home screen</b>.';
        } else if (isAndroid) {
            return '<strong>android</strong>tap the <b>⋮ menu</b> in your browser, then tap <b>add to home screen</b> or <b>install app</b>.';
        } else if (isFirefox) {
            return '<strong>firefox</strong>click the <b>⋯ menu</b> → <b>install</b>, or look for the install icon in the address bar.';
        } else {
            return '<strong>desktop</strong>click the <b>install</b> icon in the address bar, or open the browser menu and choose <b>install app</b>.';
        }
    }

    let toastTimeout;
    installBtn.addEventListener('click', async () => {
        // If native prompt is available, use it directly
        if (deferredInstallPrompt) {
            deferredInstallPrompt.prompt();
            const { outcome } = await deferredInstallPrompt.userChoice;
            deferredInstallPrompt = null;
            if (outcome === 'accepted') installBtn.style.display = 'none';
            return;
        }
        // Otherwise toggle the instruction toast
        if (installToast.classList.contains('visible')) {
            installToast.classList.remove('visible');
            clearTimeout(toastTimeout);
            return;
        }
        installToast.innerHTML = getInstallInstructions();
        installToast.classList.add('visible');
        clearTimeout(toastTimeout);
        toastTimeout = setTimeout(() => installToast.classList.remove('visible'), 6000);
    });

    // Hide if already running as installed PWA
    if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone) {
        installBtn.style.display = 'none';
    }

    window.addEventListener('appinstalled', () => { installBtn.style.display = 'none'; });

    // ── SERVICE WORKER ───────────────────────────────────────────────────────────
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').catch(e => console.warn('SW:', e));
    }

</script>
</body>
</html>
